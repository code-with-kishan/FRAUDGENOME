version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: fraudgenome-api
    ports:
      - '8000:8000'
    environment:
      - FRAUDGENOME_MODEL_DIR=/app/models
      - FRAUDGENOME_LOG_LEVEL=INFO
      - FRAUDGENOME_HOST=0.0.0.0
      - FRAUDGENOME_PORT=8000
    volumes:
      - ../models:/app/models
      - ../data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fraudgenome-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: fraudgenome-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: fraudgenome
      POSTGRES_USER: fraudgenome
      POSTGRES_PASSWORD: ${FRAUDGENOME_DB_PASSWORD:-fraudgenome_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudgenome"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:

